  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #3b82f6;
      --accent2: #06b6d4;
      --accent-glow: rgba(59,130,246,0.45);
      --bg: #0b1221;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #f1f5f9;
      --text-muted: #94a3b8;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "PingFang TC", "Noto Sans TC", BlinkMacSystemFont, system-ui, sans-serif;
      overflow: hidden;
    }

    /* ── Canvas ── */
    #canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Radial gradient overlay ── */
    .bg-glow {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(ellipse 60% 50% at 50% 40%, rgba(59,130,246,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 20% 80%, rgba(6,182,212,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── Main layout ── */
    .stage {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      gap: 0;
    }

    /* ── Card ── */
    .card {
      background: rgba(15,23,42,0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 48px 40px;
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(59,130,246,0.06),
        0 24px 64px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.06);
      opacity: 0;
      transform: translateY(28px);
      animation: rise 0.9s cubic-bezier(.22,1,.36,1) 0.2s forwards;
    }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(59,130,246,0.12);
      border: 1px solid rgba(59,130,246,0.25);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 11px;
      color: #93c5fd;
      letter-spacing: 0.04em;
      margin-bottom: 20px;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #3b82f6;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(0.7); }
    }

    /* ── Title ── */
    .title {
      font-size: clamp(20px, 4vw, 26px);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.25;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #e2e8f0 30%, #93c5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Tagline ── */
    .tagline {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.65;
      max-width: 380px;
      margin: 0 auto 28px;
    }

    /* ── Features ── */
    .features {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 32px;
      text-align: left;
    }
    .feature {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 11px 14px;
      opacity: 0;
      transform: translateX(-12px);
    }
    .feature:nth-child(1) { animation: slide-in 0.6s cubic-bezier(.22,1,.36,1) 0.65s forwards; }
    .feature:nth-child(2) { animation: slide-in 0.6s cubic-bezier(.22,1,.36,1) 0.80s forwards; }
    .feature:nth-child(3) { animation: slide-in 0.6s cubic-bezier(.22,1,.36,1) 0.95s forwards; }

    @keyframes slide-in {
      to { opacity: 1; transform: translateX(0); }
    }

    .feature-icon {
      width: 34px; height: 34px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .fi-1 { background: rgba(59,130,246,0.15); }
    .fi-2 { background: rgba(245,158,11,0.15); }
    .fi-3 { background: rgba(34,197,94,0.15); }

    .feature-text strong {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 1px;
    }
    .feature-text span {
      font-size: 11.5px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* ── Enter button ── */
    .enter-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 28px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #2563eb, #0891b2);
      color: white;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.01em;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 0 0 var(--accent-glow);
      animation: btn-appear 0.5s cubic-bezier(.22,1,.36,1) 1.1s both, glow-pulse 3s ease-in-out 1.6s infinite;
      opacity: 0;
    }
    @keyframes btn-appear {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes glow-pulse {
      0%,100% { box-shadow: 0 4px 24px rgba(37,99,235,0.35); }
      50%      { box-shadow: 0 4px 40px rgba(37,99,235,0.6), 0 0 0 4px rgba(37,99,235,0.12); }
    }
    .enter-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(37,99,235,0.55);
    }
    .enter-btn:active {
      transform: translateY(0);
    }
    .btn-arrow {
      font-size: 18px;
      transition: transform 0.2s;
    }
    .enter-btn:hover .btn-arrow {
      transform: translateX(4px);
    }

    /* ── Footer note ── */
    .foot-note {
      margin-top: 16px;
      font-size: 11px;
      color: rgba(148,163,184,0.5);
      opacity: 0;
      animation: rise 0.5s ease 1.3s forwards;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .card { padding: 32px 24px 28px; border-radius: 16px; }
      .title { font-size: 20px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .card, .feature, .enter-btn, .foot-note {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
    }
  </style>

<body>

<canvas id="canvas"></canvas>
<div class="bg-glow"></div>

<div class="stage">
  <div class="card">

    <div class="badge">

    <h1 class="title">EDB 通告<br>智能分析系統</h1>

    <p class="tagline">
      AI 即時解讀教育局通告，自動提取摘要、識別截止日期與角色職責，讓每位校務人員都能迅速掌握重點、對症行動。
    </p>

    <div class="features">
      <div class="feature">
        <div class="feature-icon fi-1">🤖</div>
        <div class="feature-text">
          <strong>AI 自動摘要</strong>
          <span>即時分析通告正文，精簡提取關鍵訊息</span>
        </div>
      </div>
      <div class="feature">
        <div class="feature-icon fi-2">⏰</div>
        <div class="feature-text">
          <strong>截止日期追蹤</strong>
          <span>自動識別申請、提交及關注截止，不漏任何期限</span>
        </div>
      </div>
      <div class="feature">
        <div class="feature-icon fi-3">👥</div>
        <div class="feature-text">
          <strong>角色分工清單</strong>
          <span>按主任、組長、EO 等職系分派行動要點</span>
        </div>
      </div>
    </div>

    <a class="enter-btn" href="edb-dashboard.html">
      進入系統
      <span class="btn-arrow">→</span>
    </a>

    <p class="foot-note">EDB 通告智能分析系統 · Leonard Wong · 2026</p>

  </div>
</div>

<script>
  // ── Self-aware iframe: skip splash entirely when embedded ───────────────
  // Same URL serves both as standalone (splash + dashboard) and as embed
  // target. If embedded, jump straight to dashboard which detects iframe
  // and renders chrome-less embed mode.
  (function () {
    try {
      if (window.self !== window.top) {
        try { sessionStorage.setItem('edb_visited_landing', '1'); } catch(e){}
        window.location.replace('edb-dashboard.html');
      }
    } catch(e) {
      // Cross-origin throw means we ARE in iframe — forward anyway
      window.location.replace('edb-dashboard.html');
    }
  })();

  // ── Particle canvas ──────────────────────────────────────────────────────
  (function () {
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');

    let W, H, mouse = { x: -9999, y: -9999 };
    const PARTICLE_COUNT = 90;
    const CONNECT_DIST   = 130;
    const MOUSE_DIST     = 160;

    const particles = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function rand(min, max) { return Math.random() * (max - min) + min; }

    class Particle {
      constructor() { this.reset(true); }
      reset(init) {
        this.x  = rand(0, W);
        this.y  = init ? rand(0, H) : -4;
        this.vx = rand(-0.25, 0.25);
        this.vy = rand(0.08, 0.35);
        this.r  = rand(1.2, 2.4);
        this.a  = rand(0.15, 0.55);
        this.life = 0;
        this.maxLife = rand(300, 700);
      }
      update() {
        // gentle mouse repel
        const dx = this.x - mouse.x;
        const dy = this.y - mouse.y;
        const d  = Math.sqrt(dx * dx + dy * dy);
        if (d < MOUSE_DIST) {
          const f = (1 - d / MOUSE_DIST) * 0.6;
          this.vx += (dx / d) * f * 0.6;
          this.vy += (dy / d) * f * 0.6;
        }
        // damping
        this.vx *= 0.98;
        this.vy *= 0.99;

        this.x += this.vx;
        this.y += this.vy;
        this.life++;

        if (this.life > this.maxLife || this.y > H + 10) this.reset(false);
      }
      draw() {
        const fade = Math.min(this.life / 60, 1, (this.maxLife - this.life) / 60);
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(147,197,253,${this.a * fade})`;
        ctx.fill();
      }
    }

    function initParticles() {
      particles.length = 0;
      for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());
    }

    function drawConnections() {
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const d  = Math.sqrt(dx * dx + dy * dy);
          if (d < CONNECT_DIST) {
            const alpha = (1 - d / CONNECT_DIST) * 0.12;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(147,197,253,${alpha})`;
            ctx.lineWidth = 0.6;
            ctx.stroke();
          }
        }
      }
    }

    function loop() {
      ctx.clearRect(0, 0, W, H);
      drawConnections();
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(loop);
    }

    window.addEventListener('resize', () => { resize(); });
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });

    // touch support
    window.addEventListener('touchmove', e => {
      mouse.x = e.touches[0].clientX;
      mouse.y = e.touches[0].clientY;
    }, { passive: true });

    resize();
    initParticles();
    loop();
  })();

  // ── Enter button — fade out + navigate ──────────────────────────────────
  document.querySelector('.enter-btn').addEventListener('click', function (e) {
    e.preventDefault();
    const href = this.href;
    // Mark that the user has passed through the landing page this session
    sessionStorage.setItem('edb_visited_landing', '1');
    document.querySelector('.card').style.transition = 'opacity 0.35s ease, transform 0.35s ease';
    document.querySelector('.card').style.opacity = '0';
    document.querySelector('.card').style.transform = 'scale(0.97)';
    setTimeout(() => { window.location.href = href; }, 350);
  });
</script>

</body>
